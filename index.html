---
layout: default
title: Flávio Tassan
---
<div class="blurb">
    <h1>Latest Post</h1>
    {% for post in site.posts limit:1 %}
    <span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a>
    {% endfor %}
    <h1>Recent Posts</h1>
    {% for post in site.posts offset:1 limit:2 %}
    <span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a>
    {% endfor %}
</div>
