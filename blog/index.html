---
layout: default
title: Tassan's Blog
---
	<h1>{{ page.title }}</h1>
	<ul class="posts">

	  {% for post in site.posts %}
	    <li>
           <span>{{ post.date | date_to_string }}</span> » <a href="{{ post.url }}#disqus_thread" title="{{ post.title }}">{{ post.title }}</a>
        </li>
	  {% endfor %}
	</ul>
